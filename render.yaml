services:
  - type: web
    name: fair-transaction-backend
    env: python
    buildCommand: "pip install -r backend/requirements.txt"
    startCommand: "cd backend && python -m uvicorn app.main:app --host 0.0.0.0 --port $PORT"
    plan: free
    envVars:
      - key: DATABASE_URL
        sync: false
        default: sqlite:////opt/render/project/src/backend/fair_transaction.db
      - key: PYTHON_VERSION
        value: 3.12.5
    disk:
      name: sqlite-data
      mountPath: /opt/render/project/src/backend
      sizeGB: 1
